{% extends "base.html" %}

{% block title %}Sign Up - Fraud Detection Platform{% endblock %}

{% block head %}
<style>
.auth-container {
  min-height: calc(100vh - 200px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.auth-card {
  background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
  border: 1px solid rgba(139, 92, 246, 0.3);
  border-radius: 1.5rem;
  padding: 2.5rem;
  width: 100%;
  max-width: 450px;
  box-shadow: 
    0 25px 50px -12px rgba(0, 0, 0, 0.5),
    0 0 100px -20px rgba(139, 92, 246, 0.3);
  backdrop-filter: blur(20px);
}

.auth-icon-wrap {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #8b5cf6, var(--accent-primary));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.5rem;
  box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.6);
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.6); }
  50% { box-shadow: 0 10px 60px -10px rgba(59, 130, 246, 0.8); }
}

.auth-icon-wrap i {
  font-size: 2.5rem;
  color: white;
}

.auth-title {
  font-size: 1.75rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #f8fafc, #94a3b8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.auth-subtitle {
  color: var(--text-muted);
  margin-bottom: 2rem;
}

.form-floating {
  position: relative;
  --gap-start: 1rem;
  --gap-width: var(--label-width, 5.5rem);
}

.form-floating .form-control,
.form-floating .form-select {
  background: rgba(0, 0, 0, 0.25) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  border-radius: 1rem !important;
  padding: 1.25rem 1rem !important;
  height: calc(3.5rem + 2px) !important;
  color: white !important;
  transition: all 0.2s ease;
}

.form-floating label, .form-floating label::before, .form-floating label::after {
  padding: 1rem 1.25rem !important;
  color: #94a3b8 !important;
  transition: all 0.2s ease !important;
  background: none !important;
  background-color: transparent !important;
  box-shadow: none !important;
  pointer-events: none;
}

.form-floating .form-control:focus,
.form-floating .form-select:focus {
  border-color: #8b5cf6 !important;
  box-shadow: none !important;
  outline: none !important;
}

.form-floating .form-control:not(:placeholder-shown),
.form-floating .form-select:not([value=""]):not(:empty) {
  border-top-color: inherit;
}

/* Create the physical gap in the border using a mask */
.form-floating > .form-control:focus,
.form-floating > .form-control:not(:placeholder-shown),
.form-floating > .form-select:focus,
.form-floating > .form-select:not([value=""]):not(:empty) {
  -webkit-mask-image: 
    linear-gradient(to right, #000 var(--gap-start), transparent var(--gap-start), transparent calc(var(--gap-start) + var(--gap-width)), #000 calc(var(--gap-start) + var(--gap-width))),
    linear-gradient(#000, #000);
  -webkit-mask-size: 100% 2px, 100% calc(100% - 2px);
  -webkit-mask-position: top, bottom;
  -webkit-mask-repeat: no-repeat, no-repeat;
  mask-image: 
    linear-gradient(to right, #000 var(--gap-start), transparent var(--gap-start), transparent calc(var(--gap-start) + var(--gap-width)), #000 calc(var(--gap-start) + var(--gap-width))),
    linear-gradient(#000, #000);
  mask-size: 100% 2px, 100% calc(100% - 2px);
  mask-position: top, bottom;
  mask-repeat: no-repeat, no-repeat;
}

.form-floating > .form-control:focus ~ label,
.form-floating > .form-control:not(:placeholder-shown) ~ label,
.form-floating > .form-select:focus ~ label,
.form-floating > .form-select:not([value=""]):not(:empty) ~ label {
  transform: scale(0.8) translateY(-0.95rem) translateX(0.15rem) !important;
  background: none !important;
  background-color: transparent !important;
  padding: 0 0.5rem !important;
  height: auto !important;
  opacity: 1 !important;
  color: #a78bfa !important;
  z-index: 10;
  box-shadow: none !important;
}

.role-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 1.5rem;
}

.role-option {
  position: relative;
  cursor: pointer;
}

.role-option input {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
}

.role-card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 1rem;
  padding: 0.75rem 1rem;
  text-align: left;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 0.75rem;
}

.role-card i {
  font-size: 1.25rem;
  margin-bottom: 0;
  background: linear-gradient(135deg, #94a3b8, #64748b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transition: all 0.4s ease;
}

.role-text-wrap {
  display: flex;
  flex-direction: column;
}

.role-card .role-name {
  display: block;
  font-weight: 700;
  font-size: 0.95rem;
  color: #f8fafc;
  margin-bottom: 0.15rem;
}

.role-card .role-desc {
  display: block;
  font-size: 0.7rem;
  color: #94a3b8;
  line-height: 1.4;
}

.role-option input:checked + .role-card {
  border-color: #8b5cf6;
  background: rgba(139, 92, 246, 0.08);
  transform: translateY(-5px);
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 0 20px -5px rgba(139, 92, 246, 0.4);
}

.role-option input:checked + .role-card i {
  background: linear-gradient(135deg, #a78bfa, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.role-option input:checked + .role-card .role-name { color: #c4b5fd; }

.role-card::after {
  content: '\F26A';
  font-family: "bootstrap-icons";
  position: absolute;
  top: 0.75rem; right: 0.75rem;
  font-size: 1rem;
  color: #8b5cf6;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.role-option input:checked + .role-card::after {
  opacity: 1;
  transform: scale(1);
}

.role-option:hover .role-card {
  border-color: rgba(139, 92, 246, 0.4);
  background: rgba(15, 23, 42, 0.6);
}

.btn-auth {
  background: linear-gradient(135deg, #8b5cf6, var(--accent-primary));
  border: none;
  border-radius: 0.75rem;
  padding: 1rem 2rem;
  font-weight: 600;
  font-size: 1.1rem;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.5);
}

.btn-auth:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 40px -10px rgba(139, 92, 246, 0.6);
}

.auth-footer {
  text-align: center;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--glass-border);
}

.auth-footer a {
  color: #8b5cf6;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s ease;
}

.auth-footer a:hover {
  color: var(--accent-primary);
}
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center">
      <div class="auth-icon-wrap">
        <i class="bi bi-person-plus"></i>
      </div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the fraud detection platform</p>
    </div>
    
    <form method="POST" action="{{ url_for('signup') }}">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Username">
        <label for="username"><i class="bi bi-person me-2"></i>Username</label>
      </div>
      
      <div class="mb-4">
        <label class="form-label text-muted small fw-bold text-uppercase mb-3 d-block ls-1">Select Access Level</label>
        <div class="role-selector">
          <label class="role-option">
            <input type="radio" name="role" value="investigator" checked>
            <div class="role-card">
              <i class="bi bi-search"></i>
              <div class="role-text-wrap">
                <span class="role-name">Investigator</span>
                <span class="role-desc">Analyze cases & alerts</span>
              </div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="admin">
            <div class="role-card">
              <i class="bi bi-shield-lock"></i>
              <div class="role-text-wrap">
                <span class="role-name">System Admin</span>
                <span class="role-desc">Manage system & users</span>
              </div>
            </div>
          </label>
        </div>
      </div>
      
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="department" name="department" placeholder="Department">
        <label for="department"><i class="bi bi-building me-2"></i>Department (Optional)</label>
      </div>
      
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="password" name="password" required placeholder="Password">
        <label for="password"><i class="bi bi-key me-2"></i>Password</label>
      </div>
      
      <div class="form-floating mb-4" style="--label-width: 10rem;">
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Confirm Password">
        <label for="confirm_password"><i class="bi bi-key-fill me-2"></i>Confirm Password</label>
      </div>
      
      <div class="d-grid">
        <button type="submit" class="btn btn-auth text-white">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </div>
    </form>
    
    <div class="auth-footer">
      <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}
